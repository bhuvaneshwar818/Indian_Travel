# Production Profile - activates with: java -jar app.jar --spring.profiles.active=prod

# Disable H2 console
spring.h2.console.enabled=false

# PostgreSQL via Supabase (override datasource)
spring.datasource.url=jdbc:postgresql://aws-0-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.vqxlechdvlbeyvynwpps
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Security - require HTTPS in production
app.cookie.secure=true

# CORS - set your production domain
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
