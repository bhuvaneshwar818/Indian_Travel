server.port=8082

# Default Local H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:indiantraveldb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.h2.console.enabled=true

# JWT Key & Expiration Configuration (256-bit secure key)
jwt.secret=IndianTravelAISuperSecretKeyThatIsAtLeast256BitsLongAndHighlySecureForHS256
jwt.expiration=86400000

# Supabase Configurations
supabase.jwt.secret=your_supabase_jwt_secret
supabase.url=https://xxxx.supabase.co
supabase.service.role.key=your_service_role_key

# SMTP configurations removed - using Resend REST API instead


resend.api.key=${RESEND_API_KEY:re_N8VnpSiL_E5f2xWbiqjxSR15poqT78R6X}
resend.from.email=${RESEND_FROM_EMAIL:noreply@thedarkroom.in}